# Cheers from Applied — Fly.io config
# Deploy: fly deploy --app cheers-from-applied
# First time: fly apps create cheers-from-applied

app = "cheers-from-applied"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "8080"
  DATA_DIR = "/data"
  NODE_ENV = "production"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 75

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[[mounts]]
  source      = "cheers_data"
  destination = "/data"
  initial_size = "1gb"

# Secrets to set before first deploy:
#   fly secrets set SMTP_HOST=... --app cheers-from-applied
#   fly secrets set SMTP_PORT=... --app cheers-from-applied
#   fly secrets set SMTP_USER=... --app cheers-from-applied
#   fly secrets set SMTP_PASS=... --app cheers-from-applied
